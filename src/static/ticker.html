<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenKJ Ticker</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    /* Transparent so it works as an OBS overlay */
    background: transparent;
    overflow: hidden;
  }

  .ticker-container {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100%;
    display: flex;
    align-items: stretch;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    font-size: clamp(14px, 2.8vh, 22px);
  }

  .ticker-badge {
    background: #b00020;
    color: #fff;
    font-weight: 800;
    letter-spacing: 0.08em;
    padding: 0 18px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    white-space: nowrap;
    text-transform: uppercase;
    font-size: 0.75em;
    border-right: 3px solid #ff304f;
  }

  .ticker-body {
    background: rgba(8, 8, 12, 0.88);
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #ticker-track {
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    white-space: nowrap;
    will-change: transform;
    padding-right: 80px; /* gap between loop copies */
  }

  .seg {
    display: inline-block;
    padding: 0 28px;
  }

  .lbl-now  { color: #ffd44f; font-weight: 700; margin-right: 6px; }
  .lbl-next { color: #5bc8ff; font-weight: 700; margin-right: 6px; }
  .lbl-up   { color: #aaa;    font-weight: 700; margin-right: 6px; }

  .singer-name { color: #fff; font-weight: 600; }
  .song-title  { color: #ddd; font-style: italic; }
  .song-artist { color: #aaa; }

  .dot  { color: #555; margin: 0 8px; }
  .pipe { color: #333; margin: 0 4px; }

  .up-entry { color: #bbb; }
  .up-num   { color: #666; margin-right: 4px; }
</style>
</head>
<body>
<div class="ticker-container">
  <div class="ticker-badge">KARAOKE</div>
  <div class="ticker-body">
    <div id="ticker-track">Starting...</div>
  </div>
</div>

<script>
  const SCROLL_PPS   = 90;   // pixels per second
  const FETCH_MS     = 1500; // poll interval

  const track = document.getElementById('ticker-track');

  let scrollX       = 0;
  let halfWidth     = 0;  // width of one copy of the content
  let lastTs        = null;
  let pendingLayout = false;
  let state         = null;

  // ── HTML builder ─────────────────────────────────────────────────────────

  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function songHtml(singer) {
    if (!singer.next_song_title) return '';
    let s = `<span class="dot">·</span><span class="song-title">${esc(singer.next_song_title)}</span>`;
    if (singer.next_song_artist) {
      s += ` <span class="song-artist">by ${esc(singer.next_song_artist)}</span>`;
    }
    return s;
  }

  function buildContent(s) {
    if (!s || s.status === 'not_ready' || s.status === 'database_not_found') {
      return '<span class="seg" style="color:#666">Waiting for OpenKJ…</span>';
    }
    if (!s.rotation || s.rotation.length === 0) {
      return '<span class="seg" style="color:#666">No singers in rotation</span>';
    }

    const parts = [];

    if (s.current_singer) {
      const c = s.current_singer;
      parts.push(
        `<span class="seg"><span class="lbl-now">NOW</span>` +
        `<span class="singer-name">${esc(c.name)}</span>${songHtml(c)}</span>`
      );
    }

    if (s.next_up) {
      const n = s.next_up;
      // Skip if identical to current (edge case: only one singer)
      if (!s.current_singer || n.name !== s.current_singer.name) {
        parts.push(
          `<span class="seg"><span class="lbl-next">NEXT</span>` +
          `<span class="singer-name">${esc(n.name)}</span>${songHtml(n)}</span>`
        );
      }
    }

    // Remaining singers up to singer_count
    const skipNames = new Set();
    if (s.current_singer) skipNames.add(s.current_singer.name);
    if (s.next_up)        skipNames.add(s.next_up.name);

    const rest = s.rotation.filter(r => !skipNames.has(r.name));
    const shown = rest.slice(0, Math.max(0, (s.singer_count || 8) - skipNames.size));

    if (shown.length > 0) {
      const entries = shown.map((r, i) => {
        const num  = i + skipNames.size + 1;
        let   html = `<span class="up-num">${num}.</span><span class="up-entry">${esc(r.name)}`;
        if (r.next_song_title) {
          html += ` <span class="song-title">${esc(r.next_song_title)}</span>`;
        }
        html += '</span>';
        return html;
      }).join('<span class="pipe">  </span>');

      parts.push(`<span class="seg"><span class="lbl-up">UP NEXT</span>${entries}</span>`);
    }

    return parts.join('<span class="pipe">◆</span>');
  }

  // ── Content update ────────────────────────────────────────────────────────

  function updateContent() {
    const html = buildContent(state);
    // Duplicate so we can loop seamlessly.
    track.innerHTML = html + html;
    pendingLayout = true;
  }

  // ── Animation loop ────────────────────────────────────────────────────────

  function animate(ts) {
    if (pendingLayout) {
      // Measure after the browser has rendered the new HTML.
      halfWidth    = track.scrollWidth / 2;
      pendingLayout = false;
      // Keep scrollX within bounds after a content change.
      if (halfWidth > 0 && scrollX >= halfWidth) scrollX %= halfWidth;
    }

    if (lastTs !== null && halfWidth > 0) {
      const delta = (ts - lastTs) / 1000;
      scrollX += SCROLL_PPS * delta;
      if (scrollX >= halfWidth) scrollX -= halfWidth;
      track.style.transform = `translateY(-50%) translateX(${-scrollX}px)`;
    }

    lastTs = ts;
    requestAnimationFrame(animate);
  }

  // ── Data fetching ─────────────────────────────────────────────────────────

  async function fetchState() {
    try {
      const r = await fetch('/api/state');
      const next = await r.json();
      // Only rebuild HTML if something actually changed.
      if (JSON.stringify(next) !== JSON.stringify(state)) {
        state = next;
        updateContent();
      }
    } catch (_) {
      // Server temporarily unreachable — keep showing last state.
    }
  }

  requestAnimationFrame(animate);
  fetchState();
  setInterval(fetchState, FETCH_MS);
</script>
</body>
</html>
